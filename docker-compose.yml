services:
  sync_job:
    build: .
    image: mypoke_tgc_sync:latest
    container_name: poke_sync_job
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: "no" # Runs once and exits. Trigger manually or via n8n cron.
    deploy:
      resources:
        limits:
          memory: 1G
